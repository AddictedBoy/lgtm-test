---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-values
  namespace: observability
data:
  values.yaml: |
    # Loki Configuration
    loki:
      auth_enabled: false
      common:
        replication_factor: 1
        path_prefix: /loki
      storage:
        type: filesystem
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      schema_config:
        configs:
          - from: 2020-10-24
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h
        max_entries_limit_per_query: 5000

    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        size: 10Gi
        storageClass: standard

    gateway:
      enabled: true
      replicas: 1
      service:
        type: NodePort

    monitoring:
      selfMonitoring:
        enabled: true
        grafanaAgent:
          installOperator: false
