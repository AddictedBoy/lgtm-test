---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-values
  namespace: observability
data:
  values.yaml: |
    # Loki Configuration - Simple Single Binary
    loki:
      auth_enabled: false
      common:
        replication_factor: 1
        path_prefix: /loki
        storage:
          type: filesystem

    # Disable all scalable components
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    
    singleBinary:
      replicas: 1

    gateway:
      enabled: true
      replicas: 1
      service:
        type: NodePort
