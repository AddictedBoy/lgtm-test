---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-values
  namespace: observability
data:
  values.yaml: |
    # Loki Configuration
    deploymentMode: SingleBinary

    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
        bucketNames:
          chunks: chunks
          ruler: ruler
          admin: admin
      schemaConfig:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h

    singleBinary:
      replicas: 1

    gateway:
      enabled: true
      replicas: 1
      service:
        type: NodePort
