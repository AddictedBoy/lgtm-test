---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-values
  namespace: observability
data:
  values.yaml: |
    # Tempo Configuration
    server:
      http_listen_port: 3200
      grpc_listen_port: 9096
    tempo:
      metricsGenerator:
        enabled: true
        processor:
          service_graphs:
            wait: 10s
          span_metrics:
            enable_target_info: true
          local_blocks:
            filter_server_spans: false
        storage:
          path: /var/tempo/metrics
          remote_write:
            - url: http://lgtm-stack-mimir-gateway.observability.svc:80/api/v1/push
              tls_config:
                insecure_skip_verify: true
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
      overrides:
        defaults:
          metrics_generator:
            processors:
              - service-graphs
              - span-metrics
              - local-blocks
            max_active_series: 10000
    distributor:
      receivers:
        jaeger:
          protocols:
            grpc:
              endpoint: 0.0.0.0:14250
            thrift_binary:
              endpoint: 0.0.0.0:6832
            thrift_compact:
              endpoint: 0.0.0.0:6831
            thrift_http:
              endpoint: 0.0.0.0:14268
        zipkin:
          endpoint: 0.0.0.0:9411
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard

    service:
      type: NodePort
      ports:
        otlp-http:
          port: 4318
          targetPort: 4318
          protocol: TCP
        otlp-grpc:
          port: 4317
          targetPort: 4317
          protocol: TCP
    query_frontend:
      search:
        concurrent_jobs: 1000
        max_duration: 30m
      traceql:
        metrics:
          enabled: true
