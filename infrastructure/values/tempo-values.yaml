---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-values
  namespace: observability
data:
  values.yaml: |
    # Tempo Configuration
    tempo:
      server:
        http_listen_port: 3200
        grpc_listen_port: 9096
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
          wal:
            path: /var/tempo/wal
      distributor:
        receivers:
          jaeger:
            protocols:
              grpc:
                endpoint: 0.0.0.0:14250
              thrift_binary:
                endpoint: 0.0.0.0:6832
              thrift_compact:
                endpoint: 0.0.0.0:6831
              thrift_http:
                endpoint: 0.0.0.0:14268
          zipkin:
            endpoint: 0.0.0.0:9411
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318

    persistence:
      enabled: true
      size: 10Gi
      storageClassName: standard

    service:
      type: NodePort
