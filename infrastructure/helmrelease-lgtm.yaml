---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lgtm-stack
  namespace: observability
spec:
  interval: 1h
  releaseName: lgtm-stack
  chart:
    spec:
      chart: mimir-distributed
      version: ">=5.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-charts
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: lgtm-values
      valuesKey: values.yaml
  targetNamespace: observability
  install:
    createNamespace: true
  upgrade:
    crds: CreateReplace
