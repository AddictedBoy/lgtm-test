apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-traces-app
  namespace: observability
  labels:
    app: sample-traces-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-traces-app
  template:
    metadata:
      labels:
        app: sample-traces-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: sample-traces-app
          image: sample-traces-app:v5
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: PORT
              value: "8081"
            - name: OTEL_SERVICE_NAME
              value: "sample-traces-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc:4318"
            - name: LOGS_APP_URL
              value: "http://sample-logs-app:8091"
            - name: METRICS_APP_URL
              value: "http://sample-metrics-app:8090"
            - name: METRICS_PORT
              value: "9090"
            - name: POSTGRES_HOST
              value: "postgres.observability.svc"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "appuser"
            - name: POSTGRES_PASSWORD
              value: "apppassword"
            - name: POSTGRES_DB
              value: "appdb"
            - name: REDIS_HOST
              value: "redis.observability.svc"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sample-traces-app
  namespace: observability
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: sample-traces-app
