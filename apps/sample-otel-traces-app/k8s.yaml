apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-otel-traces-app
  namespace: observability
  labels:
    app: sample-otel-traces-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-otel-traces-app
  template:
    metadata:
      labels:
        app: sample-otel-traces-app
    spec:
      containers:
        - name: sample-otel-traces-app
          image: sample-otel-traces-app:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: PORT
              value: "8082"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.observability.svc:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sample-otel-traces-app
  namespace: observability
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: http
  selector:
    app: sample-otel-traces-app
