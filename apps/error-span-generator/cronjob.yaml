apiVersion: batch/v1
kind: CronJob
metadata:
  name: error-span-generator
  namespace: observability
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: python
            image: python:3.11-slim
            command:
            - /bin/sh
            - -c
            - |
              pip install opentelemetry-api opentelemetry-sdk opentelemetry-exporter-otlp-proto-http -q
              python3 << 'EOF'
              import os
              import time
              from opentelemetry import trace
              from opentelemetry.sdk.trace import TracerProvider
              from opentelemetry.sdk.trace.export import BatchSpanProcessor
              from opentelemetry.exporter.otlp.proto.http.trace_exporter import OTLPSpanExporter
              from opentelemetry.sdk.resources import Resource, SERVICE_NAME
              from opentelemetry.trace import SpanKind, StatusCode
              
              otlp_endpoint = os.environ.get("OTEL_EXPORTER_OTLP_ENDPOINT", "http://alloy.observability.svc:4318")
              
              provider = TracerProvider(resource=Resource(attributes={SERVICE_NAME: "error-generator"}))
              processor = BatchSpanProcessor(OTLPSpanExporter(endpoint=f"{otlp_endpoint}/v1/traces"))
              provider.add_span_processor(processor)
              trace.set_tracer_provider(provider)
              
              tracer = trace.get_tracer("error-generator")
              
              # Generate error spans
              for i in range(5):
                  with tracer.start_as_current_span(f"error-operation-{i}", kind=SpanKind.SERVER) as span:
                      span.set_attribute("http.method", "GET")
                      span.set_attribute("http.route", f"/error-test-{i}")
                      span.set_attribute("error", True)
                      span.set_attribute("error.message", f"Simulated error {i} for APM dashboard")
                      span.set_status(StatusCode.ERROR, f"Error: Database connection failed - {i}")
                      span.add_event("Error event: Connection timeout after 30s")
              
              print(f"Generated 5 error spans with StatusCode.ERROR")
              time.sleep(2)
              EOF
