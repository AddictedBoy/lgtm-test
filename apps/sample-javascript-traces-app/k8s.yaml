apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-javascript-traces-app
  namespace: observability
  labels:
    app: sample-javascript-traces-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-javascript-traces-app
  template:
    metadata:
      labels:
        app: sample-javascript-traces-app
    spec:
      containers:
        - name: sample-javascript-traces-app
          image: sample-javascript-traces-app:v85
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: PORT
              value: "8082"
            - name: OTEL_SERVICE_NAME
              value: "sample-javascript-traces-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc:4318"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://alloy.observability.svc:4318/v1/traces"
            - name: REDIS_HOST
              value: "redis.observability.svc"
            - name: REDIS_SERVER_PORT
              value: "6379"
            - name: POSTGRES_HOST
              value: "postgres.observability.svc"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sample-javascript-traces-app
  namespace: observability
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: http
  selector:
    app: sample-javascript-traces-app
