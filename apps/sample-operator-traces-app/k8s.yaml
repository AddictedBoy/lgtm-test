apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-operator-traces-app
  namespace: observability
  labels:
    app: sample-operator-traces-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-operator-traces-app
  template:
    metadata:
      labels:
        app: sample-operator-traces-app
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
    spec:
      containers:
        - name: sample-operator-traces-app
          image: sample-operator-traces-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: PORT
              value: "8083"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy.observability.svc:4318"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "http://alloy.observability.svc:4318/v1/traces"
            - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
              value: "http://alloy.observability.svc:4318/v1/metrics"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_SERVICE_NAME
              value: "sample-operator-traces-app"
            - name: OTEL_DEBUG
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sample-operator-traces-app
  namespace: observability
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      protocol: TCP
      name: http
  selector:
    app: sample-operator-traces-app
