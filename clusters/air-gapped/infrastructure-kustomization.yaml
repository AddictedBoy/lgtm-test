---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: lgtm-test
    namespace: flux-system
  path: ./infrastructure
  prune: true
  wait: true
  timeout: 10m
  retryInterval: 2m
  dependsOn:
    - name: flux-system
