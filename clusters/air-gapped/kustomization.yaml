---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clusters
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: lgtm-npd
    namespace: flux-system
  path: ./clusters/air-gapped
  prune: true
  wait: true
  timeout: 5m
  retryInterval: 1m
