---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 60s
  ref:
    branch: main
  url: https://github.com/<org>/lgtm-npd
  secretRef:
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: ./flux-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  validation: client
