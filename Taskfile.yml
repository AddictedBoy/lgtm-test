# LGTM-Test Taskfile
# FluxCD-managed deployment from GitHub

version: "3"

vars:
  NAMESPACE: observability
  FLUX_NAMESPACE: flux-system

tasks:
  status:
    desc: Show FluxCD status
    cmds:
      - flux get all --all-namespaces

  sync:
    desc: Force sync with GitHub
    cmds:
      - flux reconcile source git flux-system --with-source
      - flux reconcile kustomization flux-system --with-source

  grafana:
    desc: Port forward Grafana and sample apps
    cmds:
      - |
        echo "Starting port forwards..."
        echo ""
        echo "Grafana:           http://localhost:3000"
        echo "sample-logs-app:   http://localhost:8091"
        echo "sample-traces-app: http://localhost:8081"
        echo "sample-metrics-app: http://localhost:8090"
        echo "helloworld:        http://localhost:8080"
        echo ""
        echo "Username: admin"
        echo "Password: admin123"
        
        kubectl port-forward -n {{.NAMESPACE}} svc/grafana 3000:3000 &
        kubectl port-forward -n {{.NAMESPACE}} svc/sample-logs-app 8091:8091 &
        kubectl port-forward -n {{.NAMESPACE}} svc/sample-traces-app 8081:8081 &
        kubectl port-forward -n {{.NAMESPACE}} svc/sample-metrics-app 8090:8090 &
        kubectl port-forward -n {{.NAMESPACE}} svc/helloworld 8080:8080 &
        
        wait

  loki:
    desc: Port forward Loki (logs)
    cmds:
      - |
        echo "Starting Loki port forward..."
        echo "Loki: http://localhost:3100"
        kubectl port-forward -n {{.NAMESPACE}} svc/loki-gateway 3100:80
        wait

  tempo:
    desc: Port forward Tempo (traces)
    cmds:
      - |
        echo "Starting Tempo port forward..."
        echo "Tempo: http://localhost:3200"
        kubectl port-forward -n {{.NAMESPACE}} svc/tempo 3200:3200
        wait

  mimir:
    desc: Port forward Mimir (metrics)
    cmds:
      - |
        echo "Starting Mimir port forward..."
        echo "Mimir: http://localhost:8080"
        kubectl port-forward -n {{.NAMESPACE}} svc/lgtm-stack-mimir-gateway 8080:80
        wait

  databases:
    desc: Port forward Postgres and Redis
    cmds:
      - |
        echo "Starting database port forwards..."
        echo "Postgres: localhost:5432"
        echo "Redis: localhost:6379"
        
        kubectl port-forward -n {{.NAMESPACE}} svc/postgres 5432:5432 &
        kubectl port-forward -n {{.NAMESPACE}} svc/redis 6379:6379 &
        
        wait

  alloy:
    desc: Port forward Alloy (OTLP receiver)
    cmds:
      - |
        echo "Starting Alloy port forwards..."
        echo "OTLP gRPC: localhost:4317"
        echo "OTLP HTTP: localhost:4318"
        echo "Agent: localhost:12345"
        
        kubectl port-forward -n {{.NAMESPACE}} svc/alloy 4317:4317 &
        kubectl port-forward -n {{.NAMESPACE}} svc/alloy 4318:4318 &
        kubectl port-forward -n {{.NAMESPACE}} svc/alloy 12345:12345 &
        
        wait

  all-services:
    desc: Port forward all services
    cmds:
      - |
        echo "Starting all service port forwards..."
        echo ""
        echo "Grafana:           http://localhost:3000"
        echo "Loki:              http://localhost:3100"
        echo "Tempo:             http://localhost:3200"
        echo "Mimir:             http://localhost:8080"
        echo "Alloy gRPC:        localhost:4317"
        echo "Alloy HTTP:        localhost:4318"
        echo "Alloy Agent:       localhost:12345"
        echo "sample-logs-app:   http://localhost:8091"
        echo "sample-traces-app: http://localhost:8081"
        echo "sample-metrics-app: http://localhost:8090"
        echo "helloworld:        http://localhost:8080"
        echo "Postgres:          localhost:5432"
        echo "Redis:             localhost:6379"
        echo ""
        echo "Username: admin"
        echo "Password: admin123"
        
        kubectl port-forward -n {{.NAMESPACE}} svc/grafana 3000:3000 &
        kubectl port-forward -n {{.NAMESPACE}} svc/loki-gateway 3100:80 &
        kubectl port-forward -n {{.NAMESPACE}} svc/tempo 3200:3200 &
        kubectl port-forward -n {{.NAMESPACE}} svc/lgtm-stack-mimir-gateway 8080:80 &
        kubectl port-forward -n {{.NAMESPACE}} svc/alloy 4317:4317 &
        kubectl port-forward -n {{.NAMESPACE}} svc/alloy 4318:4318 &
        kubectl port-forward -n {{.NAMESPACE}} svc/alloy 12345:12345 &
        kubectl port-forward -n {{.NAMESPACE}} svc/sample-logs-app 8091:8091 &
        kubectl port-forward -n {{.NAMESPACE}} svc/sample-traces-app 8081:8081 &
        kubectl port-forward -n {{.NAMESPACE}} svc/sample-metrics-app 8090:8090 &
        kubectl port-forward -n {{.NAMESPACE}} svc/helloworld 8080:8080 &
        kubectl port-forward -n {{.NAMESPACE}} svc/postgres 5432:5432 &
        kubectl port-forward -n {{.NAMESPACE}} svc/redis 6379:6379 &
        
        wait

  verify:
    desc: Verify data ingestion in Mimir and Loki
    cmds:
      - |
        echo "=== Verifying LGTM Stack ==="
        echo ""
        
        # Start port forwards in background
        kubectl port-forward -n {{.NAMESPACE}} svc/lgtm-stack-mimir-gateway 8080:80 &
        MIMIR_PID=$!
        kubectl port-forward -n {{.NAMESPACE}} svc/loki-gateway 3100:80 &
        LOKI_PID=$!
        
        sleep 3
        
        # Test Mimir (Metrics)
        echo "📊 Checking Mimir (Metrics)..."
        MIMIR_RESULT=$(curl -s "http://localhost:8080/prometheus/api/v1/query?query=up" | jq -r '.data.result[0].value[1]' 2>/dev/null)
        if [ "$MIMIR_RESULT" = "1" ]; then
          echo "  ✅ Mimir: Receiving metrics"
        else
          echo "  ❌ Mimir: No metrics found"
        fi
        
        # Test Loki (Logs)
        echo ""
        echo "📝 Checking Loki (Logs)..."
        LOKI_RESULT=$(curl -s -G "http://localhost:3100/loki/api/v1/query_range" --data-urlencode 'query={app="helloworld"}' --data-urlencode 'limit=1' | jq '.data.result | length' 2>/dev/null)
        if [ "$LOKI_RESULT" -gt "0" ]; then
          echo "  ✅ Loki: Receiving logs"
        else
          echo "  ❌ Loki: No logs found"
        fi
        
        # Test Tempo (Traces)
        echo ""
        echo "🔍 Checking Tempo (Traces)..."
        TEMPO_RESULT=$(curl -s "http://localhost:3200/api/echo" 2>/dev/null)
        if echo "$TEMPO_RESULT" | grep -q "OK"; then
          echo "  ✅ Tempo: Service available"
        else
          echo "  ❌ Tempo: Not responding"
        fi
        
        # Cleanup
        kill $MIMIR_PID $LOKI_PID 2>/dev/null
        
        echo ""
        echo "=== Verification Complete ==="

  pods:
    desc: List all pods in observability namespace
    cmds:
      - kubectl get pods -n {{.NAMESPACE}}

  logs:
    desc: Tail logs from helloworld app
    cmds:
      - kubectl logs -n {{.NAMESPACE}} -l app=helloworld -f

  traffic:
    desc: Generate test traffic to helloworld
    cmds:
      - |
        echo "Sending 50 requests to helloworld..."
        kubectl run traffic-gen -n {{.NAMESPACE}} --rm -i --image=busybox --restart=Never -- sh -c 'for i in $(seq 1 50); do wget -qO- http://helloworld.observability.svc:8080/hello?name=User$i 2>&1; sleep 0.3; done'
        echo "✅ Traffic generated"

  flux-logs:
    desc: Show FluxCD logs
    cmds:
      - flux logs --level=info --tail=50
